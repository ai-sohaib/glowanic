name: Deploy Glowanic Beauty

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract and configure optimized storefront
        env:
          AMAZON_ASSOCIATE_TAG: ${{ vars.AMAZON_ASSOCIATE_TAG }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
        run: |
          rm -rf dist
          mkdir -p dist
          if [ -f glowanic-site.zip ]; then
            unzip -q glowanic-site.zip -d dist
          else
            rsync -a --exclude='.git' --exclude='.github' --exclude='README.md' ./ dist/
          fi
          if [ -n "$AMAZON_ASSOCIATE_TAG" ]; then
            find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.xml' \) -exec sed -i "s/glowanic-20/$AMAZON_ASSOCIATE_TAG/g" {} +
          fi
          if [ -n "$CONTACT_EMAIL" ]; then
            find dist -type f \( -name '*.html' -o -name '*.js' \) -exec sed -i "s/hello@glowanic.com/$CONTACT_EMAIL/g" {} +
          fi
      - name: Materialize website files in the repository
        if: ${{ hashFiles('glowanic-site.zip') != '' }}
        run: |
          cp -a dist/. ./
          rm -f glowanic-site.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize production website files" || exit 0
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
