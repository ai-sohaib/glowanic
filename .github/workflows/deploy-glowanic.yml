name: Deploy Glowanic Beauty

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract and configure optimized storefront
        env:
          AMAZON_ASSOCIATE_TAG: ${{ vars.AMAZON_ASSOCIATE_TAG }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
        run: |
          rm -rf dist
          mkdir -p dist
          unzip -q glowanic-site.zip -d dist
          if [ -n "$AMAZON_ASSOCIATE_TAG" ]; then
            find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.xml' \) -exec sed -i "s/glowanic-20/$AMAZON_ASSOCIATE_TAG/g" {} +
          fi
          if [ -n "$CONTACT_EMAIL" ]; then
            find dist -type f \( -name '*.html' -o -name '*.js' \) -exec sed -i "s/hello@glowanic.com/$CONTACT_EMAIL/g" {} +
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
