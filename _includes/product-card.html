<article class="product-card" data-name="{{ p.name | downcase }}" data-category="{{ p.category }}" data-keywords="{{ p.keywords | join: ' ' | downcase }}"><a class="product-art art-{{ p.category }}" href="{{ p.url }}"><span>{{ p.category_name }}</span><strong>{{ p.name }}</strong></a><div class="product-body"><div class="badge">{{ p.badge }}</div><h3><a href="{{ p.url }}">{{ p.name }}</a></h3><p>{{ p.short }}</p><p class="best"><b>Best for:</b> {{ p.best }}</p><div class="card-actions"><a class="btn small" href="{{ p.url }}">View details</a><button class="heart" data-wish="{{ p.slug }}" aria-label="Save {{ p.name }}">♡</button></div></div></article>
